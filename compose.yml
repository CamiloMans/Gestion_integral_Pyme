services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rekosol_dev
      POSTGRES_USER: rekosol
      POSTGRES_PASSWORD: rekosol
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rekosol -d rekosol_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - rekosol_postgres_data:/var/lib/postgresql/data

volumes:
  rekosol_postgres_data:
